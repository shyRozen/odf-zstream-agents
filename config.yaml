pipeline:
  max_retries_per_stage: 2
  timeout_hours: 6

test_selection:
  min_relevance_score: 0.7
  max_tests: 100
  include_tiers: [tier1, tier2]
  always_include_marks: [acceptance]
  coverage_threshold: 0.8

jenkins:
  job_name: qe-deploy-ocs-cluster-prod
  poll_backoff:
    initial_seconds: 30
    max_seconds: 300
    multiplier: 2
  max_wait_hours: 6
  params:
    RUN_INSTALL_OCP: "false"
    RUN_INSTALL_OCS: "false"
    RUN_TEST: "true"
    RUN_TEARDOWN: "false"
    PRODUCTION_RUN: "true"
    REPORT_PORTAL: "true"

analysis:
  regression_lookback: 5
  auto_file_bugs: false
  root_cause_confidence_threshold: 0.7

llm:
  default_model: claude-sonnet-4-6
  opus_model: claude-opus-4-7
  opus_nodes:
    - mark_matcher
    - root_cause
  no_llm_nodes:
    - git_diff
    - jenkins_agent
    - classifier
    - notifier
  temperature: 0.1
  max_tokens: 4096

squad_mapping:
  ceph-csi: {squad: green_squad, paths: ["tests/functional/pv/", "tests/functional/storageclass/"]}
  mcg: {squad: red_squad, paths: ["tests/functional/object/mcg/"]}
  noobaa: {squad: red_squad, paths: ["tests/functional/object/mcg/"]}
  rgw: {squad: red_squad, paths: ["tests/functional/object/rgw/"]}
  monitoring: {squad: blue_squad, paths: ["tests/functional/monitoring/"]}
  encryption: {squad: green_squad, paths: ["tests/functional/encryption/"]}
  lvmo: {squad: aqua_squad, paths: ["tests/functional/lvmo/"]}
  disaster-recovery: {squad: turquoise_squad, paths: ["tests/functional/disaster-recovery/"]}
  nfs: {squad: brown_squad, paths: ["tests/functional/nfs_feature/"]}
  ui: {squad: black_squad, paths: ["tests/functional/ui/", "tests/cross_functional/ui/"]}
  rook: {squad: green_squad, paths: ["tests/functional/pv/", "tests/functional/pod_and_daemons/"]}
  upgrade: {squad: various, paths: ["tests/functional/upgrade/"]}
